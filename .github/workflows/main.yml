name: Java CI Build Test Package

on:
  push:
    branches: [ main, master, dev ]  # 推这些分支就自动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 1. 编译
      - name: Compile
        run: mvn compile

      # 2. 测试
      - name: Test
        run: mvn test

      # 3. 打包
      - name: Package
        run: mvn package -DskipTests=false

      # 4. 上传 jar 包，可下载
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: target/*.jar
